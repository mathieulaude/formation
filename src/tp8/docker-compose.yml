services:
  web:
    build: .
    image: tp8-web:1.0
    ports:
      - "3000"
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/health"]
      interval: 3s
      timeout: 1s
      retries: 5
    networks:
      - backend

  db:
    image: postgres:18.3
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: "${DB_PASSWORD}"
    networks:
      - backend
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      start_period: 2s
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  backend:
    driver: bridge

volumes:
  postgres_data:
    driver: local
